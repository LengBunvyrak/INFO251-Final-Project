<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Meals</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/INFO251-Final-Project/style/style.css" />
  </head>
  <body class="m-0 p-0 box-border">
    <!-- NAV -->
    <nav>
      <a class="logo" href="#">Sav<span>eur</span></a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="#">Recipes</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="random.html" class="nav-cta">Random Meal →</a></li>
        <!-- Dark mode button toggle -->
        <li>
          <button id="themeToggle" class="btn btn-light btn-sm ms-2">
            Dark Mode
          </button>
        </li>
      </ul>
    </nav>
    <pre id="output"></pre>

    <form
      id="search-form"
      class="flex items-center max-w-sm mx-auto space-x-2 mt-5"
    >
      <label for="simple-search" class="sr-only">Search</label>
      <div class="relative w-full">
        <div
          class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none"
        ></div>
        <input
          type="text"
          id="simple-search"
          class="px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium rounded-base ps-9 text-heading text-sm focus:ring-brand focus:border-brand block w-full placeholder:text-body"
          placeholder="Search branch name..."
          required
        />
      </div>
      <button
        type="submit"
        class="m-2 inline-flex items-center justify-center shrink-0 text-white bg-black hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs rounded-base w-10 h-10 focus:outline-none"
      >
        <svg
          class="w-5 h-5"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="2"
            d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
          />
        </svg>
        <span class="sr-only">Icon description</span>
      </button>
    </form>

    <h2 class="mx-5">Products Demo</h2>
    <div
      id="products"
      class="m-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
    ></div>

    <div class="recipes"></div>

    <script type="module" src="/INFO251-Final-Project/main.js"></script>
    <script
      type="module"
      src="/INFO251-Final-Project/pages/search/search.js"
    ></script>
  </body>
</html>
